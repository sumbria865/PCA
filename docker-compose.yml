version: "3.8"

services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth-service/.env
    restart: unless-stopped

  analysis-service:
    build: ./services/analysis-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/analysis-service/.env
    volumes:
      - ./services/ml-service:/ml
    depends_on:
      - auth-service
    restart: unless-stopped

  ml-service:
    build: ./services/ml-service
    ports:
      - "8000:8000"
    env_file:
      - ./services/ml-service/.env
    restart: unless-stopped

  frontend:
    build: ./services/frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - analysis-service
    restart: unless-stopped
