apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pca-insight-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /api/analysis
        pathType: Prefix
        backend:
          service:
            name: analysis-service
            port:
              number: 3002
      - path: /api/upload
        pathType: Prefix
        backend:
          service:
            name: analysis-service
            port:
              number: 3002
      - path: /api/rnn
        pathType: Prefix
        backend:
          service:
            name: analysis-service
            port:
              number: 3002
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
